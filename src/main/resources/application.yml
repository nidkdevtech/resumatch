spring:
  application:
    name: ResuMatch
  datasource:
    url: jdbc:postgresql://localhost:5432/jobrec
    username: nidhish
    password: password123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

ai:
  embedding:
    provider: ollama
    ollama:
      model: nomic-embed-text
      base-url: http://localhost:11434
    openai:
      model: text-embedding-3-small
      api-key: ${OPENAI_API_KEY}

  llm:
    provider: groq
    groq:
      model: llama-3.3-70b-versatile
      api-key: ${GROQ_API_KEY}
    openai:
      model: gpt-4o
      api-key: ${OPEN_AI_KEY}

server:
  port: 8080